sonar.projectKey=feliperochadev_little-words
sonar.organization=feliperochadev
sonar.sources=app,src
sonar.tests=__tests__
sonar.exclusions=**/node_modules/**,**/android/**,**/ios/**,**/coverage/**,**/scripts/agent/**
sonar.test.inclusions=__tests__/**/*.{ts,tsx,js,jsx}

# Disable TypeScript rule for explicit return types
# React components with implicit return types are correctly inferred by TypeScript
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S3800
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.tsx
