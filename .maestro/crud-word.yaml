appId: com.littlewords.app
name: "CRUD Word - Add, edit, and delete words"
---

- waitForAnimationToEnd

# Navigate to Words tab
- tapOn: "Words"
- waitForAnimationToEnd

# ============================
# ADD FIRST WORD
# ============================

- tapOn: "+ New"
- assertVisible: "New Word"

# Enter word
- tapOn:
    id: "word-input"
- inputText: "mommy"

# Select a category (Animals should be in default categories)
- tapOn: "Animals"

# Add a note
- tapOn:
    text: "Context"
- inputText: "First word ever said"

# Press Add
- tapOn: "Add"
- waitForAnimationToEnd

# Verify word appears in the list
- assertVisible: "mommy"
- assertVisible: "Animals"

# ============================
# ADD SECOND WORD
# ============================

- tapOn: "+ New"
- tapOn:
    id: "word-input"
- inputText: "daddy"
- tapOn: "Add"
- waitForAnimationToEnd
- assertVisible: "daddy"

# ============================
# ADD THIRD WORD (for sorting tests later)
# ============================

- tapOn: "+ New"
- tapOn:
    id: "word-input"
- inputText: "water"
- tapOn:
    text: "Food"
- tapOn: "Add"
- waitForAnimationToEnd
- assertVisible: "water"

# Verify word count
- assertVisible: "3 words"

# ============================
# EDIT WORD
# ============================

# Tap on the word to open edit modal
- tapOn: "mommy"
- assertVisible: "Edit Word"

# Clear and change the word text
- tapOn:
    id: "word-input"
- eraseText: 5
- inputText: "mama"

# Press Save
- tapOn: "Save"
- waitForAnimationToEnd

# Verify updated word
- assertVisible: "mama"

# ============================
# DELETE WORD
# ============================

# Tap on "daddy" to edit
- tapOn: "daddy"
- assertVisible: "Edit Word"

# Press Remove
- tapOn: "Remove"

# Confirm deletion in alert
- tapOn:
    text: "Remove"
    index: 0
- waitForAnimationToEnd

# Verify word is gone
- assertNotVisible: "daddy"
- assertVisible: "2 words"
