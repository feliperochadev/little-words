appId: com.littlewords.app
name: "Onboarding - Complete first-run setup"
---

# Poll until the onboarding screen is ready (async DB init + routing)
- extendedWaitUntil:
    visible: "English"
    timeout: 15000

# Verify both language options are visible
- assertVisible: "English"
- assertVisible: "Português"

# -- Enter baby name --
- tapOn:
    text: "E.g.*"
    optional: true
- inputText: "Luna"
- hideKeyboard

# -- Select sex --
- tapOn: "Girl"

# -- Select birth date --
- tapOn: "Select date"
- assertVisible: "Date of Birth"
- tapOn: "Confirm"

# -- Verify preview appears --
- assertVisible: "Luna"

# -- Press continue --
- tapOn: "Start with Luna 💕"

# -- Verify we land on the home/dashboard screen --
- extendedWaitUntil:
    visible: "Home"
    timeout: 15000
