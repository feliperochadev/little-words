appId: com.littlewords.app
name: "Import - Import words via text input"
---

- extendedWaitUntil:
    visible: "Settings"
    timeout: 15000

# Navigate to Settings tab
- tapOn: "Settings"
- waitForAnimationToEnd

# ============================
# IMPORT WORDS VIA TEXT
# ============================

# Scroll to and tap Import button
- scrollUntilVisible:
    element:
      id: "settings-import-title"
    direction: DOWN

# Tap the Import Words button
- tapOn:
    id: "settings-import-btn"

# Verify import modal opened
- assertVisible:
    id: "modal-title-import"

# Verify tabs are present
- assertVisible:
    id: "import-tab-text"
- assertVisible:
    id: "import-tab-csv"

# Tap the text area and type words
- tapOn:
    id: "import-text-input"
- inputText: "banana\napple, Food\norange, Food"
- hideKeyboard

# Verify preview section appears
- assertVisible:
    id: "import-preview-title"
- assertVisible: "banana"

# Press import button
- tapOn:
    id: "import-submit-btn"

# Verify result alert appears
- waitForAnimationToEnd
- assertVisible: "Import complete"
- tapOn: "OK"

# Close the import modal
- tapOn:
    id: "import-close-btn"
- waitForAnimationToEnd

# Navigate to Words tab to verify imports
- tapOn: "Words"
- waitForAnimationToEnd
- assertVisible: "banana"
- assertVisible: "apple"
- assertVisible: "orange"
