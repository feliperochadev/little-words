appId: com.littlewords.app
name: "Export - Share and save CSV export"
---

- waitForAnimationToEnd

# Navigate to Settings tab
- tapOn: "Settings"
- waitForAnimationToEnd

# ============================
# EXPORT - SHARE CSV
# ============================

# Scroll to export section
- scrollUntilVisible:
    element: "Export Data"
    direction: DOWN
- assertVisible: "Export Data"

# Tap Share button
- tapOn: "Share"
- waitForAnimationToEnd

# The share sheet will appear (OS-level) - dismiss it
# On Android, press back to dismiss
- back
- waitForAnimationToEnd

# ============================
# EXPORT - SAVE TO DEVICE
# ============================

# Tap Save button
- tapOn: "Save"
- waitForAnimationToEnd

# A file picker / save dialog may appear (OS-level) - dismiss it
- back
- waitForAnimationToEnd
