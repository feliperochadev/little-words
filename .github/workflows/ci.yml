# ─────────────────────────────────────────────────────────────
# Palavrinhas CI — GitHub Actions
#
# Jobs:
#   unit-tests  → runs on every push to any branch
#                 lint + typecheck + jest (with coverage) + semgrep + SonarCloud scan
#
# E2E tests (Maestro) are run manually for now.
# See options below for future automation.
# ─────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    types: [opened, synchronize, reopened]

# Cancel in-flight runs for the same branch when a new commit arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Lint · Typecheck · Jest · Semgrep · SonarCloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0  # Required for SonarCloud blame data and new-code detection

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Semgrep
        run: pip install semgrep

      - name: Lint · Typecheck · Test · Semgrep
        run: npm run ci

      - name: SonarCloud Scan
        # nosemgrep: generic.secrets.security.detected-sonarqube-docs-api-key.detected-sonarqube-docs-api-key
        uses: SonarSource/sonarqube-scan-action@2f77a1ec69fb1d595b06f35ab27e97605bdef703 # v5
        continue-on-error: true  # Remove once Automatic Analysis is disabled in SonarCloud project settings
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
