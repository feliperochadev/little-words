appId: com.littlewords.app
name: "CRUD Variant - Add, edit, and delete variants"
---

- extendedWaitUntil:
    visible: "Variants"
    timeout: 15000

# Navigate to Variants tab
- tapOn: "Variants"
- waitForAnimationToEnd

# ============================
# ADD VARIANT
# ============================

- tapOn: "+ New"
- assertVisible:
    id: "modal-title-new-variant"

# Select a word from the search list
- assertVisible:
    id: "variant-word-search"
- tapOn: "mama"

# Enter variant text
- tapOn:
    id: "variant-input"
- inputText: "ma-ma"
- hideKeyboard

# Add a note
- tapOn:
    id: "variant-notes-input"
- inputText: "Morning greeting"
- hideKeyboard

# Press Add
- tapOn: "Add"
- waitForAnimationToEnd

# Verify variant appears
- assertVisible:
    id: "variant-item-ma-ma"
- assertVisible: "mama"

# ============================
# ADD SECOND VARIANT
# ============================

- tapOn: "+ New"
- tapOn: "water"
- tapOn:
    id: "variant-input"
- inputText: "wa-wa"
- hideKeyboard
- tapOn: "Add"
- waitForAnimationToEnd

- assertVisible:
    id: "variant-item-wa-wa"
- assertVisible: "2 variants"

# ============================
# DUPLICATE VARIANT DETECTION
# ============================

- tapOn: "+ New"
- tapOn: "water"
- tapOn:
    id: "variant-input"
- inputText: "wa-wa"
- hideKeyboard

# Verify duplicate warning card
- assertVisible: "Variant already exists for water"

# Press Add and verify alert blocks it
- tapOn: "Add"
- assertVisible: "Duplicate variant"
- tapOn: "OK"

# Close modal
- tapOn: "Cancel"
- waitForAnimationToEnd

# ============================
# EDIT VARIANT
# ============================

# Tap on the variant to edit
- tapOn:
    id: "variant-item-ma-ma"
- assertVisible:
    id: "modal-title-edit-variant"

# Clear and update the variant text
- tapOn:
    id: "variant-input"
- eraseText: 5
- inputText: "maa-maa"
- hideKeyboard

# Press Save
- tapOn: "Save"
- waitForAnimationToEnd

# Verify updated variant
- assertVisible:
    id: "variant-item-maa-maa"

# ============================
# DELETE VARIANT
# ============================

# Tap on variant to edit
- tapOn:
    id: "variant-item-wa-wa"
- assertVisible:
    id: "modal-title-edit-variant"

# Press Remove button in modal
- tapOn:
    id: "variant-delete-btn"

# Confirm deletion in alert
- tapOn:
    text: "Remove"
    index: 0
- waitForAnimationToEnd

# Verify variant is gone
- assertNotVisible:
    id: "variant-item-wa-wa"
- assertVisible: "1 variant"
