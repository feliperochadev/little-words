appId: com.littlewords.app
name: "CRUD Variant - Add, edit, and delete variants"
---

- extendedWaitUntil:
    visible: "Variants"
    timeout: 5000

# Navigate to Variants tab
- tapOn: "Variants"

# ============================
# ADD VARIANT
# ============================

- tapOn: "+ New"
- assertVisible:
    id: "modal-title-new-variant"

# Select a word from the search list
- assertVisible:
    id: "variant-word-search"
- tapOn: "ball"

# Enter variant text
- tapOn:
    id: "variant-input"
- inputText: "ba-ba"
- hideKeyboard

# Add a note
- tapOn:
    id: "variant-notes-input"
- inputText: "Morning greeting"
- hideKeyboard

# Press Add
- tapOn: "Add"

# Verify variant appears
- assertVisible:
    id: "variant-item-ba-ba"
- assertVisible: "ball"

# ============================
# ADD SECOND VARIANT
# ============================

- tapOn: "+ New"
- tapOn: "water"
- tapOn:
    id: "variant-input"
- inputText: "wa-wa"
- hideKeyboard
- tapOn: "Add"

- assertVisible:
    id: "variant-item-wa-wa"
- assertVisible: "2 variants"

# ============================
# DUPLICATE VARIANT DETECTION
# ============================

- tapOn: "+ New"
- tapOn: "water"
- tapOn:
    id: "variant-input"
- inputText: "wa-wa"
- hideKeyboard

# Verify duplicate warning card
- assertVisible: 
    id: "modal-duplicate-variant"

# Press Add and verify alert blocks it
- tapOn: "Add"
- tapOn: "OK"

# Close modal
- tapOn: "Cancel"

# ============================
# EDIT VARIANT
# ============================

# Tap on the variant to edit
- tapOn:
    id: "variant-item-ba-ba"
- assertVisible:
    id: "modal-title-edit-variant"

# Clear and update the variant text
- tapOn:
    id: "variant-input"
- eraseText: 5
- inputText: "baa-baa"
- hideKeyboard

# Press Save
- tapOn: "Save"

# Verify updated variant
- assertVisible:
    id: "variant-item-baa-baa"

# ============================
# DELETE VARIANT
# ============================

# Tap on variant to edit
- tapOn:
    id: "variant-item-wa-wa"
- assertVisible:
    id: "modal-title-edit-variant"

# Press Remove button in modal
- tapOn:
    id: "variant-delete-btn"

# Confirm deletion in alert
- tapOn:
    text: "Remove"
    index: 0

# Verify variant is gone
- assertNotVisible:
    id: "variant-item-wa-wa"
- assertVisible: "1 variant"
