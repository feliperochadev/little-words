appId: com.littlewords.app
name: "Variants - Search and sort functionality"
---

- extendedWaitUntil:
    visible: "Variants"
    timeout: 5000

# Navigate to Variants tab
- tapOn: "Variants"

# Verify variants are visible
- assertVisible:
    id: "variant-item-baa-baa"

# ============================
# SEARCH
# ============================

# Search for a specific variant
- tapOn:
    id: "variants-search"
- inputText: "baa"
- hideKeyboard
- assertVisible:
    id: "variant-item-baa-baa"
- assertVisible: "1 variant"

# Clear search
- tapOn:
    id: "variants-search"
- eraseText: 3
- hideKeyboard

# Search with no results
- tapOn:
    id: "variants-search"
- inputText: "xyznotfound"
- hideKeyboard
- assertVisible: "No variants found"
- tapOn:
    id: "variants-search"
- eraseText: 11
- hideKeyboard

# ============================
# SORT - A to Z
# ============================

- tapOn:
    id: "variants-sort-btn"
- assertVisible:
    id: "sort-option-alpha_asc"
- tapOn:
    id: "sort-option-alpha_asc"

# ============================
# SORT - Z to A
# ============================

- tapOn:
    id: "variants-sort-btn"
- tapOn:
    id: "sort-option-alpha_desc"

# ============================
# SORT - Oldest first
# ============================

- tapOn:
    id: "variants-sort-btn"
- tapOn:
    id: "sort-option-date_asc"

# ============================
# SORT - Most recent (back to default)
# ============================

- tapOn:
    id: "variants-sort-btn"
- tapOn:
    id: "sort-option-date_desc"
