appId: com.littlewords.app
name: "Onboarding - Complete first-run setup"
---

# Poll until the onboarding screen is ready (async DB init + routing)
- extendedWaitUntil:
    visible: "English"
    timeout: 10000

# Verify both language options are visible
- assertVisible: "English"
- assertVisible: "Português"

# -- Enter baby name --
- tapOn:
    id: "onboarding-name-input"
- inputText: "Luna"
- hideKeyboard

# -- Select sex --
- tapOn:
    id: "onboarding-sex-girl-btn"

# -- Select birth date --
- tapOn:
    id: "onboarding-birthdate-btn"
- assertVisible:
    id: "onboarding-date-title"
- tapOn:
    id: "onboarding-date-confirm-btn"

# -- Verify preview appears --
- assertVisible: "Luna"

# -- Press continue --
- tapOn:
    id: "onboarding-continue-btn"

# -- Verify we land on the home/dashboard screen --
- extendedWaitUntil:
    visible: "Home"
    timeout: 5000
