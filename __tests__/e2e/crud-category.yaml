appId: com.littlewords.app
name: "CRUD Category - Add, edit, and delete a category"
---

- extendedWaitUntil:
    visible: "Settings"
    timeout: 15000

# Navigate to Settings tab
- tapOn: "Settings"
- waitForAnimationToEnd
- assertVisible:
    id: "settings-categories-title"

# ============================
# ADD CATEGORY
# ============================

- scrollUntilVisible:
    element: "+ Category"
    direction: DOWN
- tapOn: "+ Category"
- assertVisible:
    id: "modal-title-new-category"

# Enter category name
- tapOn:
    id: "category-name-input"
- inputText: "Fruits"
- hideKeyboard

# Pick a different emoji (tap the 2nd emoji in the list)
- tapOn: "🍎"

# Press Create
- tapOn: "Create Category"
- waitForAnimationToEnd

# Verify category appears in settings list
- swipe:
    direction: DOWN
    duration: 2000
- scrollUntilVisible:
    element: "Fruits"
    direction: DOWN
- assertVisible: "Fruits"

# ============================
# EDIT CATEGORY
# ============================

# Tap on the category row to open edit modal
- tapOn: "Fruits"
- assertVisible:
    id: "modal-title-edit-category"

# Clear and change the name
- tapOn:
    id: "category-name-input"
- eraseText: 6
- inputText: "Veggies"
- hideKeyboard

# Press Save
- tapOn: "Save"
- waitForAnimationToEnd

# Verify updated name in settings
- swipe:
    direction: DOWN
    duration: 2000
- scrollUntilVisible:
    element: "Veggies"
    direction: DOWN
- assertVisible: "Veggies"

# ============================
# DELETE CATEGORY
# ============================

# Tap on the category to open edit modal
- tapOn: "Veggies"
- assertVisible:
    id: "modal-title-edit-category"

# Press Remove button in modal
- tapOn:
    id: "category-delete-btn"

# Confirm deletion in alert
- tapOn: "Remove"
- waitForAnimationToEnd

# Verify category is gone
- assertNotVisible: "Veggies"
