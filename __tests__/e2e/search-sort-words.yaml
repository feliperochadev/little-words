appId: com.littlewords.app
name: "Words - Search and sort functionality"
---

- extendedWaitUntil:
    visible: "Words"
    timeout: 15000

# Navigate to Words tab
- tapOn: "Words"
- waitForAnimationToEnd

# Verify words are visible
- assertVisible: "mama"
- assertVisible: "water"

# ============================
# SEARCH
# ============================

# Search for a specific word
- tapOn:
    id: "words-search"
- inputText: "mama"
- hideKeyboard
- assertVisible: "mama"
- assertVisible: "1 word"

# Clear search
- tapOn:
    id: "words-search"
- eraseText: 4
- hideKeyboard
- assertVisible: "mama"
- assertVisible: "water"

# Search with no results
- tapOn:
    id: "words-search"
- inputText: "xyznotfound"
- hideKeyboard
- assertVisible: "No words found"
- tapOn:
    id: "words-search"
- eraseText: 11
- hideKeyboard

# ============================
# SORT - A to Z
# ============================

# Tap the sort button to open menu
- tapOn:
    id: "words-sort-btn"
- assertVisible:
    id: "sort-option-alpha_asc"
- tapOn:
    id: "sort-option-alpha_asc"
- waitForAnimationToEnd

# ============================
# SORT - Z to A
# ============================

- tapOn:
    id: "words-sort-btn"
- tapOn:
    id: "sort-option-alpha_desc"
- waitForAnimationToEnd

# ============================
# SORT - Oldest first
# ============================

- tapOn:
    id: "words-sort-btn"
- tapOn:
    id: "sort-option-date_asc"
- waitForAnimationToEnd

# ============================
# SORT - Most recent (back to default)
# ============================

- tapOn:
    id: "words-sort-btn"
- tapOn:
    id: "sort-option-date_desc"
- waitForAnimationToEnd
