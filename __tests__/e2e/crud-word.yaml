appId: com.littlewords.app
name: "CRUD Word - Add, edit, and delete words"
---

- extendedWaitUntil:
    visible: "Words"
    timeout: 5000

# Navigate to Words tab
- tapOn: "Words"

# ============================
# ADD FIRST WORD
# ============================

- tapOn: "+ New"

# Enter word
- tapOn:
    id: "word-input"
- inputText: "mommy"
- hideKeyboard

# Select a category
- tapOn:
    id: "category-chip-family"

# Add a note
- tapOn:
    id: "word-notes-input"
- inputText: "First word ever said"
- hideKeyboard

# Press Add
- tapOn: "Add"

# Verify word appears in the list
- extendedWaitUntil:
    visible:
      id: "word-item-mommy"
    timeout: 1000

# ============================
# ADD SECOND WORD
# ============================

- tapOn: "+ New"
- tapOn:
    id: "word-input"
- inputText: "daddy"
- hideKeyboard
- tapOn: "Add"
- extendedWaitUntil:
    visible:
      id: "word-item-daddy"
    timeout: 1000

# ============================
# ADD THIRD WORD (for sorting tests later)
# ============================

- tapOn: "+ New"
- tapOn:
    id: "word-input"
- inputText: "water"
- hideKeyboard
- tapOn:
    id: "category-scroll-right"
- tapOn:
    id: "category-chip-food"
- tapOn: "Add"
- extendedWaitUntil:
    visible:
      id: "word-item-water"
    timeout: 1000

# ============================
# EDIT WORD
# ============================

# Tap on the word to open edit modal
- tapOn:
    id: "word-item-mommy"

# Clear and change the word text
- tapOn:
    id: "word-input"
- eraseText: 5
- inputText: "mama"
- hideKeyboard

# Press Save
- tapOn: "Save"

# Verify updated word
- extendedWaitUntil:
    visible:
      id: "word-item-mama"
    timeout: 1000

# ============================
# DELETE WORD
# ============================

# Tap on "daddy" to edit
- tapOn:
    id: "word-item-daddy"

# Press Remove button in modal
- tapOn:
    id: "word-delete-btn"

# Confirm deletion in alert
- tapOn:
    text: "Remove"
    index: 0

# Verify word is gone
- assertNotVisible:
    id: "word-item-daddy"

# ============================
# ADD WORD WITH NEW CATEGORY
# ============================

- tapOn: "+ New"
- tapOn:
    id: "word-input"
- inputText: "ball"
- hideKeyboard

# Tap right arrow repeatedly to scroll carousel to end where add button is
# Use optional taps so the last ones silently pass once the arrow disappears at end
- tapOn:
    id: "category-scroll-right"
    optional: true
- tapOn:
    id: "category-scroll-right"
    optional: true
- tapOn:
    id: "category-scroll-right"
    optional: true

# Open add category modal from within the word modal
- tapOn:
    id: "category-add-btn"
- extendedWaitUntil:
    visible:
      id: "modal-title-new-category"
    timeout: 1000
- tapOn:
    id: "category-name-input"
- inputText: "Toys"
- hideKeyboard
- tapOn:
    id: "category-save-btn"

- tapOn: "Add"
- extendedWaitUntil:
    visible:
      id: "word-item-ball"
    timeout: 1000

# ============================
# ADD VARIANTS WITH DEDUPLICATION
# ============================

- tapOn:
    id: "word-item-mama"

# Scroll down to the variants section
- scrollUntilVisible:
    element:
      id: "word-add-variant-btn"
    direction: DOWN
    timeout: 300

# Add first variant
- tapOn:
    id: "word-add-variant-btn"
- tapOn:
    id: "word-variant-input-0"
- inputText: "maa-maa"
- hideKeyboard

# Add same variant again
- tapOn:
    id: "word-add-variant-btn"
- tapOn:
    id: "word-variant-input-1"
- inputText: "ma-ma"
- hideKeyboard
- tapOn: "Save"

# Verify only 2 variant chips appear on the word card
- extendedWaitUntil:
    visible:
      id: "word-variant-chip-ma-ma"
    timeout: 1000

# ============================
# DELETE ONE VARIANT
# ============================

- tapOn:
    id: "word-item-mama"

# Scroll down to existing variant rows
- scrollUntilVisible:
    element:
      id: "existing-variant-row-maa-maa"
    direction: DOWN
    timeout: 300

# Tap the variant row to enter inline edit mode, then delete
- tapOn:
    id: "existing-variant-row-maa-maa"
- tapOn:
    id: "existing-variant-delete-maa-maa"
- hideKeyboard

- tapOn: "Save"

# Verify only one variant remains
- assertNotVisible:
    id: "word-variant-chip-maa-maa"


# ============================
# DELETE MAMA WORD
# ============================

# Tap on "daddy" to edit
- tapOn:
    id: "word-item-mama"

# Press Remove button in modal
- tapOn:
    id: "word-delete-btn"

# Confirm deletion in alert
- tapOn:
    text: "Remove"
    index: 0

# Verify word is gone
- assertNotVisible:
    id: "word-item-mama"    

# ============================
# CHANGE DATE VIA DATE PICKER
# ============================

- tapOn: "+ New"
- tapOn:
    id: "word-input"
- inputText: "teddy"
- hideKeyboard

# Scroll down to the date picker field
- scrollUntilVisible:
    element:
      id: "date-picker-btn"
    direction: DOWN
    timeout: 300

# Open the date picker
- tapOn:
    id: "date-picker-btn"

# Tap directly on the 2025 year item (visible below the selected 2026)
- tapOn:
    id: "date-picker-year-wheel-item-2025"
- waitForAnimationToEnd

# Verify the preview shows the previous year (full text is "DD Month 2025")
- extendedWaitUntil:
    visible:
      id: "date-picker-preview"
      text: ".* 2025"
    timeout: 1000

# Confirm date selection
- tapOn:
    id: "date-picker-confirm"

# Scroll down to the Add button and save
- scrollUntilVisible:
    element:
      text: "Add"
    direction: DOWN
    timeout: 300
- tapOn: "Add"

# Verify the word was saved with the updated year
- extendedWaitUntil:
    visible:
      id: "word-date-teddy"
      text: "\\d{1,2}/\\d{1,2}/2025"
    timeout: 1000