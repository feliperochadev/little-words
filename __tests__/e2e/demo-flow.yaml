appId: com.littlewords.app
name: "Demo Flow - Core journey without assertions"
---

- clearState
- launchApp

# ============================
# ONBOARDING
# ============================

- extendedWaitUntil:
    visible: "English"
    timeout: 5000
- tapOn:
    id: "onboarding-name-input"
- inputText: "John"
- hideKeyboard
- tapOn: "Boy"
- tapOn: "Select date"
- tapOn: "Confirm"
- tapOn:
    id: "onboarding-continue-btn"

# ============================
# ADD WORD + CATEGORY + VARIANTS
# ============================

- tapOn: "Words"
- tapOn: "+ New"
- tapOn:
    id: "word-input"
- inputText: "sun"
- hideKeyboard
- tapOn:
    id: "category-scroll-right"
    optional: true
- tapOn:
    id: "category-chip-nature"
- tapOn:
    id: "word-notes-input"
- inputText: "Bright morning word"
- hideKeyboard
- scrollUntilVisible:
    element:
      id: "word-add-variant-btn"
    direction: DOWN
    timeout: 300
- tapOn:
    id: "word-add-variant-btn"
- tapOn:
    id: "word-variant-input-0"
- inputText: "su-n"
- hideKeyboard
- tapOn:
    id: "word-add-variant-btn"
- tapOn:
    id: "word-variant-input-1"
- inputText: "sunny"
- hideKeyboard
- scrollUntilVisible:
    element:
      id: "date-picker-btn"
    direction: DOWN
    timeout: 300
- tapOn:
    id: "date-picker-btn"
- tapOn:
    text: "2025"
- tapOn:
    id: "date-picker-confirm"
- scrollUntilVisible:
    element:
      text: "Add"
    direction: DOWN
    timeout: 300
- tapOn: "Add"

# ============================
# VARIANTS TAB + SEARCH
# ============================

- tapOn: "Variants"
- tapOn: "+ New"
- tapOn: "sun"
- tapOn:
    id: "variant-input"
- inputText: "suu"
- hideKeyboard
- tapOn: "Add"
- tapOn:
    id: "variants-search"
- inputText: "sun"
- hideKeyboard
- tapOn:
    id: "variants-search"
- eraseText: 2
- hideKeyboard

# ============================
# IMPORT CSV + BACK TO WORDS
# ============================

# Prerequisite: push the fixture CSV to the device before running:
#   adb push __tests__/e2e/fixtures/sample-import.csv /sdcard/Downloads/sample-import.csv

- tapOn: "Settings"
- scrollUntilVisible:
    element:
      id: "settings-import-title"
    direction: DOWN
- tapOn:
    id: "settings-import-btn"
- tapOn:
    id: "import-tab-csv"
- tapOn:
    id: "import-csv-pick-btn"
- tapOn: "sample-import.csv"
- scrollUntilVisible:
    element:
      id: "import-submit-btn"
    direction: DOWN
- tapOn:
    id: "import-submit-btn"
- tapOn: "OK"

- tapOn: "Words"
- swipe:
    direction: UP
    duration: 1000

# ============================
# HOME DASHBOARD
# ============================

- tapOn: "🏠"
- swipe:
    direction: UP
    duration: 800
- swipe:
    direction: UP
    duration: 800
