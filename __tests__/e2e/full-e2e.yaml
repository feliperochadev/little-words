- runFlow: crud-word.yaml

# ============================
# 4. CRUD VARIANT (in Variants tab)
# ============================
- runFlow: crud-variant.yaml

# ============================
# 5. SEARCH & SORT WORDS
# ============================
- runFlow: search-sort-words.yaml

# ============================
# 6. SEARCH & SORT VARIANTS
# ============================
- runFlow: search-sort-variants.yaml

# ============================
# 7. IMPORT WORDS
# ============================
- runFlow: import-words.yaml

# ============================
# 8. DELETE ALL DATA + RE-ONBOARD
# ============================
- runFlow: delete-all-data.yaml

# ============================
# 9. EXPORT WORDS
# ============================
- runFlow: export-words.yaml
